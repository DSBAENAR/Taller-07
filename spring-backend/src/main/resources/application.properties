# Server port
server.port=8443

# TLS Configuration (uncomment when certificates are available)
# server.ssl.enabled=true
# server.ssl.key-store=/etc/letsencrypt/live/your-domain/keystore.p12
# server.ssl.key-store-password=changeit
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=tomcat

# H2 Database
spring.datasource.url=jdbc:h2:mem:securedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# CORS (update with your Apache server domain)
app.cors.allowed-origins=https://localhost,https://your-apache-domain.com
