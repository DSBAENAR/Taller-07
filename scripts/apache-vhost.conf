# Apache Virtual Host Configuration for SecureApp
# Place this in /etc/httpd/conf.d/secureapp.conf
# Let's Encrypt will auto-configure TLS, but this is the base config

<VirtualHost *:80>
    ServerName YOUR_APACHE_DOMAIN
    DocumentRoot /var/www/html

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName YOUR_APACHE_DOMAIN
    DocumentRoot /var/www/html

    # TLS Configuration (Let's Encrypt will update these paths)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/YOUR_APACHE_DOMAIN/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/YOUR_APACHE_DOMAIN/privkey.pem

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    # Security Headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
</VirtualHost>
